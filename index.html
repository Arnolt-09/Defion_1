// =========================================
// HOOK: useScrollReveal — BIDIRECTIONAL
// Animasi muncul saat scroll bawah,
// hilang saat scroll atas, muncul lagi!
// =========================================
function useScrollReveal() {
  React.useEffect(() => {
    // Lacak posisi scroll sebelumnya
    let lastScrollY = window.scrollY;

    const observer = new IntersectionObserver(
      (entries) => {
        const currentScrollY = window.scrollY;
        const scrollingDown = currentScrollY >= lastScrollY;
        lastScrollY = currentScrollY;

        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // Masuk viewport → tampilin animasi
            entry.target.classList.add('revealed');
            entry.target.classList.remove('exit-up', 'exit-down');
          } else {
            // Keluar viewport → sembunyikan dengan arah yg sesuai
            entry.target.classList.remove('revealed');
            if (scrollingDown) {
              // Elemen keluar ke atas saat scroll bawah
              entry.target.classList.add('exit-up');
              entry.target.classList.remove('exit-down');
            } else {
              // Elemen keluar ke bawah saat scroll atas
              entry.target.classList.add('exit-down');
              entry.target.classList.remove('exit-up');
            }
          }
        });
      },
      { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
    );

    const elements = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
    elements.forEach((el) => observer.observe(el));

    return () => observer.disconnect();
  }, []);
}

function DeFiWalletSection() {
  const [progress, setProgress] = React.useState(0);
  const [activeTag, setActiveTag] = React.useState('Decentralized');
  const [txVisible, setTxVisible] = React.useState(false);
  const sectionRef = React.useRef(null);

  // Animasi progress circle saat masuk viewport — reset saat keluar
  React.useEffect(() => {
    let intervalRef = null;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          // Reset & mulai animasi
          setProgress(0);
          setTxVisible(false);
          setTimeout(() => {
            setTxVisible(true);
            let start = 0;
            const target = 72;
            intervalRef = setInterval(() => {
              start += 1.5;
              setProgress(Math.min(start, target));
              if (start >= target) clearInterval(intervalRef);
            }, 20);
          }, 200);
        } else {
          // Keluar viewport → reset supaya bisa animasi lagi
          if (intervalRef) clearInterval(intervalRef);
          setProgress(0);
          setTxVisible(false);
        }
      },
      { threshold: 0.3 }
    );
    if (sectionRef.current) observer.observe(sectionRef.current);
    return () => { observer.disconnect(); if (intervalRef) clearInterval(intervalRef); };
  }, []);

  const transactions = [
    { type: 'Sent',     icon: '↗', amount: '0.0004968', from: 'from 0×938',  coin: 'VAREN',  color: '#f87171' },
    { type: 'Received', icon: '↙', amount: '1.038',     from: 'from 0×847',  coin: 'BANCOR', color: '#4ade80' },
    { type: 'Sent',     icon: '↗', amount: '4.94863',   from: 'from ×7360',  coin: 'BNB',    color: '#f87171' },
    { type: 'Pending',  icon: '⟳', amount: '—',         from: 'processing',  coin: '...',    color: '#facc15' },
  ];

  const tags1 = ['2.7k Assets', 'Success', 'Decentralized', 'Smart C'];
  const tags2 = ['Tokenized Trust', 'DeFi - Revolution', 'LiquidityLeaders'];

  // SVG circle progress — SVG 210x210, r=95-10=85
  const radius = 95;
  const circumference = 2 * Math.PI * (radius - 10);
  const strokeDash = circumference - (progress / 100) * circumference;

  return (
    <section ref={sectionRef} className="py-28 px-8 overflow-hidden">
      <div className="max-w-7xl mx-auto">

        {/* Header */}
        <div className="text-center mb-16 reveal">
          <div className="inline-flex items-center gap-2 text-green-400 text-xs font-semibold mb-4 tracking-[0.2em] uppercase">
            <span className="w-4 h-px bg-green-400"></span>
            Wallet System
            <span className="w-4 h-px bg-green-400"></span>
          </div>
          <h2 className="font-syne text-5xl md:text-6xl font-black text-white mb-3">DeFi Wallet</h2>
          <p className="text-gray-500 text-sm max-w-sm mx-auto">
            Exploratory mission with DeFi Horizon & navigating through the vast possibilities
          </p>
          <div className="mt-6">
            <button className="border border-white/15 text-gray-300 text-xs px-6 py-2.5 rounded-full hover:border-green-400/40 hover:text-green-400 transition-all">
              How it works?
            </button>
          </div>
        </div>

        {/* Main card — framed like referensi */}
        <div className="rounded-3xl overflow-hidden reveal-scale"
          style={{background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.07)'}}>

          {/* Card header bar */}
          <div className="border-b border-white/[0.05] px-8 py-4 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-green-400 text-sm">◎</span>
              <span className="text-gray-400 text-xs font-medium">DeFi Wallet System</span>
            </div>
            <div className="flex items-center gap-4 text-[11px] text-gray-500">
              <span className="text-gray-300">Home</span>
              <span>DeFi App</span>
              <span>Assets</span>
              <div className="w-5 h-5 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
                <span className="w-1.5 h-1.5 rounded-full bg-green-400"></span>
              </div>
            </div>
          </div>

          {/* Card body */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-0">

            {/* LEFT — Balance + Transactions */}
            <div className="p-8 border-r border-white/[0.05]">
              {/* Balance */}
              <div className="mb-8">
                <div className="text-gray-500 text-[11px] uppercase tracking-widest mb-2">DeFi Wallet System</div>
                <div className="font-syne text-6xl font-black text-white">+A3.7</div>
                <div className="flex gap-2 mt-4">
                  <button className="text-[11px] bg-white/5 border border-white/10 text-gray-300 px-4 py-1.5 rounded-full hover:bg-white/10 transition-all">
                    ↑ Send

                  <button className="text-[11px] bg-green-400/10 border border-green-400/25 text-green-400 px-4 py-1.5 rounded-full hover:bg-green-400/20 transition-all">
                    ↓ Receive

              </div>

              {/* Transactions */}

                {transactions.map((tx, i) => (
                  <div key={i}
                    className="flex items-center justify-between rounded-xl px-4 py-3"

                      background: 'rgba(255,255,255,0.03)',

                    <div className="flex items-center gap-3">

                        style={{background:`${tx.color}18`, border:`1px solid ${tx.color}40`, color: tx.color}}>
                        {tx.icon}

                      <div>
                        <div className="text-white text-sm font-medium leading-tight">{tx.type}</div>

                    </div>
                    <div className="text-right">
                      <div className="text-white text-sm font-semibold tabular-nums">{tx.amount}</div>
                      <div className="text-gray-500 text-[11px]">{tx.coin}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Pending row */}
              <div className="mt-4 flex items-center gap-2 px-2">
                <div className="flex-1 h-px bg-white/5"></div>
                <span className="text-[11px] text-gray-600 flex items-center gap-1.5">
                  <span className="w-1.5 h-1.5 rounded-full bg-yellow-500 pulse-dot"></span>
                  Pending
                </span>
                <div className="flex-1 h-px bg-white/5"></div>
              </div>
            </div>

            {/* RIGHT — Circular progress */}
            <div className="p-8 flex flex-col items-center justify-center gap-6"
              style={{background:'radial-gradient(ellipse at center, rgba(34,197,94,0.04) 0%, transparent 70%)'}}>

              {/* Target label */}
              <div className="w-full flex justify-end">
                <div className="flex items-center gap-2 bg-white/[0.04] border border-white/[0.07] rounded-full px-3 py-1.5 text-[11px]">
                  <span className="w-1.5 h-1.5 rounded-full bg-green-400 pulse-dot"></span>
                  <span className="text-gray-400">Target 2024</span>
                  <span className="text-green-400 font-medium">· DeFi app</span>
                </div>
              </div>

              {/* Circle */}
              <div className="relative">
                {/* Outer glow ring */}
                <div className="absolute inset-0 rounded-full"
                  style={{boxShadow:'0 0 60px rgba(34,197,94,0.12)', borderRadius:'50%'}}></div>

                <svg width="210" height="210" className="rotate-[-90deg] drop-shadow-lg">
                  {/* Outer track */}
                  <circle cx="105" cy="105" r={radius}
                    fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="2"/>
                  {/* Main track */}
                  <circle cx="105" cy="105" r={radius - 10}
                    fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="18"/>
                  {/* Progress arc */}
                  <circle cx="105" cy="105" r={radius - 10}
                    fill="none"
                    stroke="url(#progressGrad2)"
                    strokeWidth="18"
                    strokeLinecap="round"
                    strokeDasharray={circumference}
                    strokeDashoffset={strokeDash}
                    style={{transition: 'stroke-dashoffset 0.04s linear'}}
                  />
                  <defs>
                    <linearGradient id="progressGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stopColor="#86efac"/>
                      <stop offset="50%" stopColor="#4ade80"/>
                      <stop offset="100%" stopColor="#22d3ee"/>
                    </linearGradient>
                  </defs>
                </svg>

                {/* Center */}
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <div className="w-11 h-11 rounded-full flex items-center justify-center mb-2"
                    style={{background:'rgba(34,197,94,0.15)', border:'1px solid rgba(74,222,128,0.35)'}}>
                    <span className="text-green-400 text-lg">⚡</span>
                  </div>
                  <div className="text-white font-syne font-bold text-xl">Step 01</div>
                  <div className="text-green-400 text-sm font-semibold">{Math.round(progress)}%</div>
                </div>
              </div>

              {/* Done badge */}
              <button className="flex items-center gap-2 bg-white/[0.05] border border-white/10 rounded-full px-6 py-2.5 hover:border-green-400/30 transition-all">
                <span className="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>
                <span className="text-white text-sm font-medium">Done</span>
              </button>
            </div>
          </div>
        </div>

        {/* Tag pills */}
        <div className="mt-10 reveal">
          <div className="flex flex-wrap gap-2 justify-center mb-2.5">
            {tags1.map((tag, i) => (
              <button key={i} onClick={() => setActiveTag(tag)}
                className="px-4 py-1.5 rounded-full text-xs font-medium border transition-all duration-200"
                style={{
                  background: activeTag === tag ? 'rgba(74,222,128,0.12)' : 'rgba(255,255,255,0.03)',
                  borderColor: activeTag === tag ? 'rgba(74,222,128,0.4)' : 'rgba(255,255,255,0.07)',
                  color: activeTag === tag ? '#4ade80' : '#6b7280'
                }}>
                {activeTag === tag && <span className="mr-1.5 text-green-400">⬡</span>}
                {tag}

            ))}

                  borderColor: activeTag === tag ? 'rgba(74,222,128,0.4)' : 'rgba(255,255,255,0.07)',
                  color: activeTag === tag ? '#4ade80' : '#6b7280'
                }}>
                {activeTag === tag && <span className="mr-1.5 text-green-400">⬡</span>}
                {tag}

        </div>

      </div>
    </section>
  );
