// =========================================
// HOOK: useScrollReveal — BIDIRECTIONAL
// Animasi muncul saat scroll bawah,
// hilang saat scroll atas, muncul lagi!
// =========================================
function useScrollReveal() {
  React.useEffect(() => {
    // Lacak posisi scroll sebelumnya
    let lastScrollY = window.scrollY;

    const observer = new IntersectionObserver(
      (entries) => {
        const currentScrollY = window.scrollY;
        const scrollingDown = currentScrollY >= lastScrollY;
        lastScrollY = currentScrollY;

        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // Masuk viewport → tampilin animasi
            entry.target.classList.add('revealed');
            entry.target.classList.remove('exit-up', 'exit-down');
          } else {
            // Keluar viewport → sembunyikan dengan arah yg sesuai
            entry.target.classList.remove('revealed');
            if (scrollingDown) {
              // Elemen keluar ke atas saat scroll bawah
              entry.target.classList.add('exit-up');
              entry.target.classList.remove('exit-down');
            } else {
              // Elemen keluar ke bawah saat scroll atas
              entry.target.classList.add('exit-down');
              entry.target.classList.remove('exit-up');
            }
          }
        });
      },
      { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
    );

    const elements = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
    elements.forEach((el) => observer.observe(el));

    return () => observer.disconnect();
  }, []);
}

function DeFiWalletSection() {
  const [progress, setProgress] = React.useState(0);
  const [activeTag, setActiveTag] = React.useState('Decentralized');
  const [txVisible, setTxVisible] = React.useState(false);
  const sectionRef = React.useRef(null);

  // Animasi progress circle saat masuk viewport — reset saat keluar
  React.useEffect(() => {
    let intervalRef = null;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          // Reset & mulai animasi
          setProgress(0);
          setTxVisible(false);
          setTimeout(() => {
            setTxVisible(true);
            let start = 0;
            const target = 72;
            intervalRef = setInterval(() => {
              start += 1.5;
              setProgress(Math.min(start, target));
              if (start >= target) clearInterval(intervalRef);
            }, 20);
          }, 200);
        } else {
          // Keluar viewport → reset supaya bisa animasi lagi
          if (intervalRef) clearInterval(intervalRef);
          setProgress(0);
          setTxVisible(false);
        }
      },
      { threshold: 0.3 }
    );
    if (sectionRef.current) observer.observe(sectionRef.current);
    return () => { observer.disconnect(); if (intervalRef) clearInterval(intervalRef); };
  }, []);

  const transactions = [
    { type: 'Sent',     icon: '↗', amount: '0.0004968', from: 'from 0×938',  coin: 'VAREN',  color: '#f87171' },

  // SVG circle progress — SVG 200x200, center 100,100

    <section ref={sectionRef} className="py-24 px-8 overflow-hidden">
      <div className="max-w-7xl mx-auto">

        {/* Header */}
        <div className="text-center mb-16 reveal">
          <h2 className="font-syne text-5xl font-bold text-white mb-3">DeFi Wallet</h2>
          <p className="text-gray-400 text-sm max-w-md mx-auto">
            Exploratory mission with DeFi Horizon & navigating through the vast possibilities
          </p>
          <div className="mt-6">
            <button className="border border-white/20 text-white text-sm px-6 py-2 rounded-full hover:border-green-400/50 hover:text-green-400 transition-all">
              How it works?
            </button>
          </div>
        </div>

        {/* Main content grid */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">

          {/* LEFT — Transaction list */}
          <div className="reveal-left">
            <div className="mb-4">
              <div className="text-gray-400 text-xs mb-1 uppercase tracking-widest">DeFi Wallet System</div>
              <div className="font-syne text-5xl font-black text-white">+A3.7</div>
            </div>

            <div className="space-y-3 mt-8">
              {transactions.map((tx, i) => (
                <div
                  key={i}
                  className="flex items-center justify-between bg-white/[0.04] border border-white/[0.06] rounded-2xl px-4 py-3 backdrop-blur-sm"
                  style={{
                    opacity: txVisible ? 1 : 0,
                    transform: txVisible ? 'translateX(0)' : 'translateX(-30px)',
                    transition: `all 0.5s ease ${i * 0.12}s`
                  }}
                >
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-sm"
                      style={{color: tx.color}}>
                      {tx.icon}
                    </div>
                    <div>
                      <div className="text-white text-sm font-medium">{tx.type}</div>
                      <div className="text-gray-500 text-xs">{tx.from}</div>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-white text-sm font-semibold">{tx.amount}</div>
                    <div className="text-gray-500 text-xs">{tx.coin}</div>
                  </div>
                </div>
              ))}

              {/* Pending indicator */}
              <div className="text-center py-2">
                <span className="text-xs text-gray-600 flex items-center justify-center gap-2">
                  <span className="w-1.5 h-1.5 rounded-full bg-yellow-400 pulse-dot inline-block"></span>
                  Pending
                </span>
              </div>
            </div>
          </div>

          {/* RIGHT — Circular progress + Step */}
          <div className="flex flex-col items-center gap-6 reveal-right">

            {/* Label Target — di ATAS circle, tidak nabrak */}
            <div className="flex items-center gap-2 self-end mr-4">
              <div className="w-1.5 h-1.5 rounded-full bg-green-400"></div>
              <div className="text-xs text-gray-400 leading-tight">
                <span className="text-gray-300 font-medium">Target 2024</span>
                <span className="text-green-400 ml-1.5">· DeFi app</span>
              </div>
            </div>

            {/* Circular progress */}
            <div className="relative">
              <svg width="200" height="200" className="rotate-[-90deg]">
                {/* Track */}
                <circle cx="100" cy="100" r={radius}
                  fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="14"/>
                {/* Progress */}
                <circle cx="100" cy="100" r={radius}
                  fill="none"
                  stroke="url(#progressGrad)"
                  strokeWidth="14"
                  strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={strokeDash}
                  style={{transition: 'stroke-dashoffset 0.05s linear'}}
                />
                <defs>
                  <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#4ade80"/>
                    <stop offset="100%" stopColor="#22d3ee"/>
                  </linearGradient>
                </defs>
              </svg>

              {/* Center content */}
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <div className="w-10 h-10 rounded-full bg-green-400/20 border border-green-400/40 flex items-center justify-center mb-2">
                  <span className="text-green-400 text-lg">⚡</span>
                </div>
                <div className="text-white font-syne font-bold text-lg">Step 01</div>
                <div className="text-green-400 text-xs font-semibold mt-0.5">{Math.round(progress)}%</div>
              </div>
            </div>

            {/* Done badge */}
            <div className="flex items-center gap-2 bg-white/5 border border-white/10 rounded-full px-5 py-2">
              <span className="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>
              <span className="text-white text-sm font-medium">Done</span>
            </div>
          </div>
        </div>

        {/* Tag pills row */}
        <div className="mt-16 reveal">
          <div className="flex flex-wrap gap-2 justify-center mb-3">
            {tags1.map((tag, i) => (
              <button
                key={i}
                onClick={() => setActiveTag(tag)}
                className="px-4 py-1.5 rounded-full text-xs font-medium border transition-all duration-200"
                style={{
                  background: activeTag === tag ? 'rgba(74,222,128,0.15)' : 'rgba(255,255,255,0.04)',
                  borderColor: activeTag === tag ? 'rgba(74,222,128,0.5)' : 'rgba(255,255,255,0.08)',
                  color: activeTag === tag ? '#4ade80' : '#9ca3af'
                }}
              >
                {activeTag === tag && <span className="mr-1.5">⬡</span>}
                {tag}
              </button>
            ))}
          </div>
          <div className="flex flex-wrap gap-2 justify-center">
            {tags2.map((tag, i) => (
              <button
                key={i}
                onClick={() => setActiveTag(tag)}
                className="px-4 py-1.5 rounded-full text-xs font-medium border transition-all duration-200"
                style={{
                  background: activeTag === tag ? 'rgba(74,222,128,0.15)' : 'rgba(255,255,255,0.04)',
                  borderColor: activeTag === tag ? 'rgba(74,222,128,0.5)' : 'rgba(255,255,255,0.08)',
                  color: activeTag === tag ? '#4ade80' : '#9ca3af'
                }}
              >
                {activeTag === tag && <span className="mr-1.5">⬡</span>}
                {tag}
              </button>
            ))}
          </div>
        </div>

      </div>
    </section>
  );
}
